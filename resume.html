<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>連奕晴｜個人作品集</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #ff5e62;
    --secondary: #ff9966;
    --bg: #f8f9fa;
    --text: #333;
}

body {
    margin: 0;
    font-family: 'Noto Sans TC', sans-serif;
    background-color: var(--bg);
    color: var(--text);
    line-height: 1.6;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: #fff;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.1);
}

/* Hero Section */
.hero {
    position: relative;
    padding: 80px 50px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    display: flex;
    align-items: center;
    gap: 40px;
}

.avatar {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 6px solid rgba(255,255,255,0.3);
    object-fit: cover;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.name { font-size: 3rem; font-weight: 900; }
.subtitle { font-size: 1.1rem; opacity: 0.9; margin-top: 10px; }

/* Music Bar */
.music-bar {
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    border-bottom: 1px solid #eee;
}

.music-btn {
    background: #333;
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
}

.music-btn:hover { background: var(--primary); }

/* Content Cards */
.content { padding: 40px; }
.card {
    padding: 25px;
    margin-bottom: 25px;
    border-radius: 20px;
    background: #fffcfc;
    border: 1px solid #f0f0f0;
    transition: 0.4s;
}

.card:hover { transform: translateY(-8px); border-color: var(--primary); }

h2 { color: var(--primary); margin-top: 0; display: flex; align-items: center; gap: 10px; }

.tag {
    display: inline-block;
    background: #ffe5e5;
    color: var(--primary);
    padding: 6px 15px;
    border-radius: 10px;
    margin-right: 8px;
    font-size: 0.9rem;
    font-weight: 600;
}

.timeline { border-left: 3px solid #eee; padding-left: 20px; margin-left: 5px; }
.timeline div { margin-bottom: 15px; position: relative; }

.fade { opacity: 0; transform: translateY(20px); transition: 0.8s; }
.show { opacity: 1; transform: translateY(0); }

@media(max-width:768px) {
    .hero { flex-direction: column; text-align: center; }
}
</style>
</head>

<body>

<div class="music-bar">
    <div>🎵 靈感音樂</div>
    <button class="music-btn" onclick="toggleMusic()">播放 / 暫停</button>
</div>

<div class="container">
    <div class="hero">
        <img class="avatar" src="https://picsum.photos/seed/lian/300/300" alt="連奕晴">
        <div class="hero-text">
            <div class="name">連奕晴</div>
            <div class="subtitle">
                🎓 亞洲大學 AI學系 AI1B<br>
                ✨ 專注於 AI 技術與音樂藝術的跨界探索
            </div>
        </div>
    </div>

    <div class="content">
        <div class="card fade">
            <h2>👤 關於我</h2>
            <p>我是連奕晴。一名在 AI 與音樂創作之間尋找平衡的學生。不僅對程式邏輯充滿好奇，更對生活中的整潔與質感有著堅持。</p>
        </div>

        <div class="card fade">
            <h2>🎯 興趣領域</h2>
            <span class="tag"># 唱歌</span>
            <span class="tag"># 吉他創作</span>
            <span class="tag"># AI 技術</span>
            <span class="tag"># 品味冰品</span>
        </div>

        <div class="card fade">
            <h2>📍 成長進度</h2>
            <div class="timeline">
                <div><strong>2024</strong> ｜ 程式設計邏輯啟蒙</div>
                <div><strong>2025</strong> ｜ 踏入 AI 領域探索</div>
                <div><strong>Future</strong> ｜ 結合 AI 輔助音樂創作</div>
            </div>
        </div>
    </div>
</div>

<script>
const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('show'); });
}, {threshold: 0.1});
document.querySelectorAll('.fade').forEach(i => observer.observe(i));

function toggleMusic(){
    const audio = document.getElementById('bgm') || new Audio('audio/music.mp3');
    audio.paused ? audio.play() : audio.pause();
}
</script>
</body>
</html>
