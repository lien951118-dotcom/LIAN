<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>履歷表 - 連奕晴</title>
<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #fff5e6, #ffe0cc);
        color: #333;
    }

    .container {
        max-width: 900px;
        margin: 40px auto;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        overflow: hidden;
    }

    .header {
        display: flex;
        align-items: center;
        padding: 30px;
        background: linear-gradient(90deg, #ff9966, #ff5e62);
        color: white;
    }

    .profile-pic {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid white;
        margin-right: 25px;
    }

    .name {
        font-size: 32px;
        font-weight: bold;
    }

    .info {
        margin-top: 8px;
        font-size: 14px;
    }

    .section {
        padding: 25px 30px;
        border-bottom: 1px solid #eee;
    }

    .section h2 {
        color: #ff5e62;
        margin-bottom: 15px;
    }

    .card {
        background: #fff7f0;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 10px;
    }

    .btn {
        display: inline-block;
        padding: 10px 18px;
        background: #ff5e62;
        color: white;
        border-radius: 10px;
        text-decoration: none;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #ff9966;
    }

    .hidden {
        display: none;
    }
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <img src="images/profile.jpg" alt="個人照片" class="profile-pic">
        <div>
            <div class="name">連奕晴</div>
            <div class="info">亞洲大學 AI學系</div>
            <div class="info">學號：114022071</div>
        </div>
    </div>

    <div class="section">
        <h2>個人簡介</h2>
        <div class="card">
            對人工智慧與科技應用充滿熱情，具備邏輯思維與問題解決能力。
            持續學習新技術，並致力於將AI應用於實際生活場景。
        </div>
    </div>

    <div class="section">
        <h2>學歷</h2>
        <div class="card">
            亞洲大學 AI學系
        </div>
    </div>

    <div class="section">
        <h2>技能</h2>
        <div class="card">Python / 基礎程式設計</div>
        <div class="card">人工智慧基礎概念</div>
        <div class="card">問題分析與邏輯思考</div>
    </div>

    <div class="section">
        <h2>互動功能</h2>
        <button class="btn" onclick="toggleExtra()">顯示更多資訊</button>
        <div id="extra" class="hidden">
            <div class="card">興趣：健身、科技研究、競技運動</div>
            <div class="card">目標：成為AI應用領域的專業人才</div>
        </div>
    </div>

</div>

<script>
function toggleExtra() {
    const extra = document.getElementById('extra');
    extra.classList.toggle('hidden');
}
</script>

</body>
</html>
