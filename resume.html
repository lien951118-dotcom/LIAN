<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷 - 新版型</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
    background: #f5f5f5;
    color: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 900px;
    height: 500px; /* 固定高度，模擬圖片比例 */
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    overflow: hidden;
    display: flex;
    position: relative;
}

/* 左側文字區塊 */
.left-section {
    width: 50%;
    padding: 60px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
}

.left-section h1 {
    font-size: 64px;
    font-weight: bold;
    color: #333;
    margin: 0;
}

.left-section .name-zh {
    letter-spacing: 10px;
}

.left-section hr {
    width: 200px;
    border: 0;
    border-top: 4px solid #333;
    margin: 20px 0;
}

.left-section .title {
    font-size: 18px;
    color: #333;
    margin: 0;
}

/* 中央圓形頭像 */
.profile-img-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 250px;
    height: 250px;
    border-radius: 50%;
    overflow: hidden;
    border: 15px solid white; /* 白色邊框 */
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    z-index: 10;
}

.profile-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 右側色塊區塊 */
.right-section {
    width: 50%;
    background-color: #C1D9C1; /* 淺綠色背景 */
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding-right: 60px;
    box-sizing: border-box;
}

.right-section .name-en {
    font-size: 64px;
    font-weight: bold;
    color: white;
    margin: 0;
}

/* 原始功能的樣式，暫時隱藏 */
.section, .skill-bar, .button {
    display: none;
}
</style>
</head>

<body>
    <audio id="bgMusic" loop>
    <source src="audio/music.mp3" type="audio/mpeg">
    您的瀏覽器不支援音訊元素。
</audio>

<script>
    window.onload = () => {
        // 執行原本的技能條動畫
        document.querySelectorAll(".skill-fill").forEach(bar => {
            let value = bar.getAttribute("data-skill");
            if (value) {
                bar.style.width = value + "%";
            }
        });

        // 嘗試自動播放音樂
        const audio = document.getElementById('bgMusic');
        
        // 嘗試播放
        const playPromise = audio.play();

        if (playPromise !== undefined) {
            playPromise.then(_ => {
                // 自動播放成功
                console.log("播放成功");
            }).catch(error => {
                // 自動播放被瀏覽器阻擋，等待使用者點擊頁面後播放
                console.log("自動播放被阻擋，等待互動");
                document.body.addEventListener('click', () => {
                    audio.play();
                }, { once: true }); // 只觸發一次
            });
        }
    }
</script>
<div class="container">

    <div class="left-section">
        <h1 class="name-zh">威廉</h1>
        <hr>
        <p class="title">專案經理</p>
    </div>

    <div class="profile-img-container">
        <img src="https://via.placeholder.com/300x300.png?text=Profile+Photo" class="profile-img" alt="頭像">
    </div>

    <div class="right-section">
        <h1 class="name-en">威廉</h1>
    </div>

    </div>

<script>
// 技能條動畫
window.onload = () => {
    document.querySelectorAll(".skill-fill").forEach(bar => {
        let value = bar.getAttribute("data-skill");
        if (value) {
            bar.style.width = value + "%";
        }
    });
}

// 小互動：改名字
function changeName() {
    let newName = prompt("輸入你的名字：");
    if (newName) {
        document.getElementById("name").innerText = newName;
    }
}
</script>

</body>
</html>
