<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>連奕晴｜履歷作品集</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI",sans-serif;
    background:linear-gradient(135deg,#fff3e6,#ffe0cc);
}

.container{
    max-width:1150px;
    margin:40px auto;
    background:#fff;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 18px 45px rgba(0,0,0,0.15);
}

/* HERO 封面區 */
.hero{
    position:relative;
    padding:60px 40px;
    display:flex;
    align-items:center;
    gap:35px;
    background:linear-gradient(90deg,#ff9966,#ff5e62);
    color:white;
}

.cover-glow{
    position:absolute;
    inset:0;
    background:radial-gradient(circle at 20% 20%,rgba(255,255,255,0.2),transparent 40%);
}

.avatar{
    width:170px;
    height:170px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
    box-shadow:0 12px 28px rgba(0,0,0,0.25);
    z-index:1;
}

.hero-text{
    z-index:1;
}

.name{
    font-size:44px;
    font-weight:900;
    letter-spacing:2px;
}

.subtitle{
    margin-top:10px;
    font-size:15px;
    line-height:1.8;
    opacity:0.95;
}

/* 音樂播放器 */
.music-bar{
    position:sticky;
    top:0;
    background:#fff;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #eee;
    z-index:10;
}

.music-btn{
    background:#ff5e62;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:20px;
    cursor:pointer;
}

.music-btn:hover{
    background:#ff9966;
}

.content{
    padding:30px;
}

.card{
    background:#fff7f0;
    padding:22px;
    border-radius:16px;
    margin-bottom:18px;
    box-shadow:0 6px 18px rgba(0,0,0,0.06);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

h2{
    color:#ff5e62;
    margin-bottom:10px;
}

.tag{
    display:inline-block;
    background:#ff5e62;
    color:white;
    padding:5px 12px;
    border-radius:20px;
    margin:4px;
    font-size:12px;
}

.timeline{
    border-left:3px solid #ff5e62;
    padding-left:15px;
}

.timeline div{
    margin-bottom:10px;
}

.fade{
    opacity:0;
    transform:translateY(15px);
    transition:0.7s;
}

.show{
    opacity:1;
    transform:translateY(0);
}

@media(max-width:768px){
    .hero{
        flex-direction:column;
        text-align:center;
    }
}
</style>
</head>

<body>

<!-- 音樂 -->
<div class="music-bar">
    <div>🎵 背景音樂</div>
    <button class="music-btn" onclick="toggleMusic()">播放 / 暫停</button>
</div>

<audio id="bgm" loop>
    <source src="audio/music.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <!-- HERO 封面 -->
    <div class="hero">
        <div class="cover-glow"></div>
        <img class="avatar" src="https://picsum.photos/seed/lian/300/300" alt="大頭貼">
        <div class="hero-text">
            <div class="name">連奕晴</div>
            <div class="subtitle">
                🎓 亞洲大學 AI學系 AI1B<br>
                🎂 11/18｜♏ 天蠍座<br>
                🎧 唱歌｜吉他｜音樂<br>
                🧼 注重整潔｜喜歡乾淨環境
            </div>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="card fade">
            <h2>👤 自我介紹</h2>
            <p>嗨，我是連奕晴，目前就讀AI1B。喜歡唱歌、吉他與音樂創作，也注重生活整潔。</p>
        </div>

        <div class="card fade">
            <h2>🎯 興趣</h2>
            <span class="tag">唱歌</span>
            <span class="tag">吉他</span>
            <span class="tag">音樂</span>
            <span class="tag">吃冰</span>
        </div>

        <div class="card fade">
            <h2>🐰 喜好</h2>
            <p>最喜歡兔子與冰品</p>
        </div>

        <div class="card fade">
            <h2>✨ 個人特質</h2>
            <p>細心｜整潔｜專注｜情感豐富</p>
        </div>

        <div class="card fade">
            <h2>📍 成長紀錄</h2>
            <div class="timeline">
                <div>2024｜開始學程式</div>
                <div>2025｜AI入門</div>
                <div>未來｜AI × 音樂創作</div>
            </div>
        </div>

    </div>
</div>

<script>
const items=document.querySelectorAll('.fade');
const observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting){
            e.target.classList.add('show');
        }
    });
},{threshold:0.15});
items.forEach(i=>observer.observe(i));

function toggleMusic(){
    const audio=document.getElementById('bgm');
    if(audio.paused){
        audio.play();
    }else{
        audio.pause();
    }
}
</script>

</body>
</html>
